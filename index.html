<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResolveFlow AI — Logistics Support Intelligence Platform</title>
<meta name="description" content="AI-powered unified customer complaint and communication platform for modern logistics companies.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#020617;--sf:#0F172A;--c:#111827;--bo:#1F2937;--p:#3B82F6;--a:#8B5CF6;--s:#22C55E;--w:#F59E0B;--d:#EF4444;--t:#E2E8F0;--t2:#94A3B8;--sw:240px;--sc:62px;--r:12px;--r2:8px}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:'Inter',sans-serif}
input,textarea,select{font-family:'Inter',sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.35)}50%{box-shadow:0 0 0 7px rgba(59,130,246,0)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.5);opacity:1}}
@keyframes gradientShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes dashFlow{to{stroke-dashoffset:-24}}
@keyframes spin{to{transform:rotate(360deg)}}
/* APP SHELL */
.app-shell{display:none;height:100vh;overflow:hidden}
.app-shell.active{display:flex}
/* SIDEBAR */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--sf);border-right:1px solid var(--bo);height:100vh;display:flex;flex-direction:column;transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:10;flex-shrink:0}
.sidebar.collapsed{width:var(--sc);min-width:var(--sc)}
.sb-logo{padding:16px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--bo);flex-shrink:0;height:60px}
.sb-logo-ic{width:30px;height:30px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:13px;font-weight:900;letter-spacing:-.5px}
.sb-logo-txt{font-weight:800;font-size:14.5px;white-space:nowrap;overflow:hidden;color:var(--t)}
.sb-logo-txt span{color:var(--p)}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;overflow-x:hidden}
.sb-nav::-webkit-scrollbar{width:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r2);cursor:pointer;transition:all .18s;margin-bottom:1px;white-space:nowrap;color:var(--t2);font-size:13px;font-weight:500;border-left:2.5px solid transparent;user-select:none;position:relative}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--t)}
.nav-item.active{background:rgba(59,130,246,.1);color:var(--p);border-left-color:var(--p)}
.nav-icon{width:15px;height:15px;flex-shrink:0;stroke-width:1.8}
.nav-label{overflow:hidden;font-size:13px}
.nav-badge{background:var(--d);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:auto;flex-shrink:0}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--bo);flex-shrink:0}
.sb-toggle{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;transition:all .18s;border:none;background:none;width:100%;white-space:nowrap}
.sb-toggle:hover{background:rgba(255,255,255,.05);color:var(--t)}
/* MAIN */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* NAVBAR */
.navbar{height:60px;background:var(--sf);border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;position:relative}
.nb-search{position:relative;flex:1;max-width:280px}
.nb-search input{width:100%;background:var(--bg);border:1px solid var(--bo);border-radius:var(--r2);padding:7px 12px 7px 32px;color:var(--t);font-size:13px;outline:none;transition:border-color .2s}
.nb-search input:focus{border-color:var(--p)}
.nb-search-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t2);width:14px;height:14px}
.nb-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.nb-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r2);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:#2563EB;transform:translateY(-1px)}
.nb-icon-btn{position:relative;background:none;border:none;cursor:pointer;color:var(--t2);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r2);transition:all .18s}
.nb-icon-btn:hover{background:rgba(255,255,255,.06);color:var(--t)}
.nb-badge{position:absolute;top:2px;right:2px;background:var(--d);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 4px;border:1.5px solid var(--sf);display:none;line-height:1}
.nb-badge.has-notifs{display:inline-flex;align-items:center;justify-content:center}
.lang-btn{padding:4px 10px;background:rgba(255,255,255,.04);border:1px solid var(--bo);border-radius:6px;cursor:pointer;font-size:11px;color:var(--t2);transition:all .18s;font-weight:600}
.lang-btn:hover{color:var(--t);border-color:var(--p)}
.user-av{width:32px;height:32px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;cursor:pointer;color:#fff;flex-shrink:0}
/* NOTIFICATION DROPDOWN */
.notif-drop{position:absolute;right:16px;top:56px;width:300px;background:var(--sf);border:1px solid var(--bo);border-radius:var(--r);box-shadow:0 12px 36px rgba(0,0,0,.5);z-index:200;display:none;overflow:hidden}
.notif-drop.open{display:block;animation:fadeIn .2s ease}
.nd-hdr{padding:12px 16px;border-bottom:1px solid var(--bo);font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.nd-item{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:10px;cursor:pointer}
.nd-item:hover{background:rgba(255,255,255,.03)}
.nd-item:last-child{border-bottom:none}
.nd-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.nd-txt{font-size:12.5px;color:var(--t);line-height:1.4}
.nd-time{font-size:11px;color:var(--t2);margin-top:3px}
/* SEARCH DROPDOWN */
.search-drop{position:absolute;left:0;top:45px;width:100%;background:var(--sf);border:1px solid var(--bo);border-radius:var(--r);box-shadow:0 12px 36px rgba(0,0,0,.5);z-index:200;display:none;max-height:350px;overflow-y:auto}
.search-drop.open{display:block;animation:fadeIn .2s ease}
.sr-item{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;display:flex;flex-direction:column;gap:3px}
.sr-item:hover{background:rgba(255,255,255,.03)}
.sr-item:last-child{border-bottom:none}
.sr-title{font-size:13px;font-weight:600;color:var(--t)}
.sr-desc{font-size:11.5px;color:var(--t2)}
/* PAGES */
.page-content{flex:1;overflow-y:auto;overflow-x:hidden}
.page-content::-webkit-scrollbar{width:4px}
.page-content::-webkit-scrollbar-thumb{background:var(--bo);border-radius:2px}
.page{display:none;padding:28px 32px;animation:fadeIn .3s ease}
.page.active{display:block}
.page-hdr{margin-bottom:24px}
.page-hdr h1{font-size:21px;font-weight:700;color:var(--t)}
.page-hdr p{color:var(--t2);font-size:13px;margin-top:4px}
/* SPECIAL PAGE LAYOUTS */
.inbox-page{display:none}
.inbox-page.active{display:grid;grid-template-columns:272px 1fr 296px;height:calc(100vh - 60px)}
.cmd-page{display:none}
.cmd-page.active{display:flex;flex-direction:column;height:calc(100vh - 60px);overflow:hidden;padding:20px 24px;gap:14px}
/* CARDS */
.card{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);padding:24px;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);padding:18px;transition:all .2s;cursor:default}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:rgba(59,130,246,.2)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.kpi-ic{width:34px;height:34px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center}
.kpi-trend{font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;display:flex;align-items:center;gap:2px}
.kpi-val{font-size:26px;font-weight:800;color:var(--t);line-height:1}
.kpi-lbl{font-size:12px;color:var(--t2);margin-top:5px}
/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:20px}
.chart-card{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.chart-ttl{font-size:13px;font-weight:600;color:var(--t);margin-bottom:14px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:16px;font-size:11px;font-weight:600;white-space:nowrap}
.b-s{background:rgba(34,197,94,.12);color:var(--s)}
.b-w{background:rgba(245,158,11,.12);color:var(--w)}
.b-d{background:rgba(239,68,68,.12);color:var(--d)}
.b-p{background:rgba(59,130,246,.12);color:var(--p)}
.b-a{background:rgba(139,92,246,.12);color:var(--a)}
.b-n{background:rgba(148,163,184,.1);color:var(--t2)}
/* TABLE */
.tbl-wrap{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden}
.tbl-bar{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--bo)}
.tbl-srch{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--bo);border-radius:var(--r2);padding:6px 11px;flex:1;max-width:260px}
.tbl-srch input{background:none;border:none;outline:none;color:var(--t);font-size:13px;width:100%}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);border-bottom:1px solid var(--bo);cursor:pointer;white-space:nowrap;user-select:none}
.tbl th:hover{color:var(--t)}
.tbl td{padding:12px 14px;font-size:13px;color:var(--t);border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
/* INBOX */
.inbox-list{border-right:1px solid var(--bo);overflow-y:auto;background:var(--sf)}
.inbox-list::-webkit-scrollbar{width:0}
.inbox-list-hdr{padding:14px;border-bottom:1px solid var(--bo);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.inbox-list-hdr h3{font-size:14px;font-weight:700}
.conv-item{padding:12px 13px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;display:flex;gap:9px}
.conv-item:hover{background:rgba(255,255,255,.03)}
.conv-item.active{background:rgba(59,130,246,.07);border-left:2px solid var(--p)}
.conv-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}
.conv-info{flex:1;min-width:0}
.conv-nr{display:flex;justify-content:space-between;align-items:center}
.conv-name{font-size:13px;font-weight:600;color:var(--t)}
.conv-time{font-size:10px;color:var(--t2)}
.conv-prev{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-meta{display:flex;align-items:center;gap:5px;margin-top:4px}
.ch-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.sla-h{background:rgba(239,68,68,.15);color:var(--d)}
.sla-m{background:rgba(245,158,11,.15);color:var(--w)}
.sla-l{background:rgba(34,197,94,.15);color:var(--s)}
.unread-dot{background:var(--p);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:auto}
.chat-area{display:flex;flex-direction:column;background:var(--bg)}
.chat-hdr{padding:12px 18px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:10px;background:var(--sf);flex-shrink:0}
.chat-hdr-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.chat-hdr-name{font-size:14px;font-weight:700}
.chat-hdr-sub{font-size:11px;color:var(--t2)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--bo);border-radius:2px}
.msg-row{display:flex;flex-direction:column;max-width:70%}
.msg-row.agent{align-self:flex-end;align-items:flex-end}
.msg-row.customer{align-self:flex-start}
.msg-bub{padding:9px 13px;border-radius:11px;font-size:13px;line-height:1.5}
.msg-cust{background:var(--c);border:1px solid var(--bo);border-radius:11px 11px 11px 3px}
.msg-agnt{background:var(--p);color:#fff;border-radius:11px 11px 3px 11px}
.msg-ai-bub{background:rgba(139,92,246,.09);border:1px solid rgba(139,92,246,.22);border-radius:10px;font-size:12px;color:var(--a);padding:10px 13px;align-self:stretch;margin:4px 0}
.msg-time{font-size:10px;color:var(--t2);margin-top:3px}
.chat-input-bar{padding:12px 16px;border-top:1px solid var(--bo);display:flex;gap:9px;background:var(--sf);flex-shrink:0}
.chat-inp{flex:1;background:var(--bg);border:1px solid var(--bo);border-radius:10px;padding:9px 13px;color:var(--t);font-size:13px;outline:none;resize:none;transition:border-color .2s;height:38px;line-height:1.4}
.chat-inp:focus{border-color:var(--p)}
.send-btn{background:var(--p);border:none;border-radius:var(--r2);padding:9px 14px;cursor:pointer;color:#fff;transition:all .2s;font-weight:600;font-size:13px;display:flex;align-items:center;gap:5px}
.send-btn:hover{background:#2563EB}
.ctx-panel{border-left:1px solid var(--bo);overflow-y:auto;background:var(--sf)}
.ctx-panel::-webkit-scrollbar{width:0}
.ctx-sec{padding:13px 14px;border-bottom:1px solid var(--bo)}
.ctx-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:9px;display:flex;align-items:center;gap:5px}
.ctx-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:12.5px}
.ctx-lbl{color:var(--t2)}
.ctx-val{color:var(--t);font-weight:500;font-size:12.5px;text-align:right;max-width:55%}
.ai-sug{background:rgba(139,92,246,.09);border:1px solid rgba(139,92,246,.22);border-radius:10px;padding:11px;font-size:12.5px;color:var(--t);line-height:1.6}
.ai-sug-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--a);margin-bottom:6px;letter-spacing:.05em;display:flex;align-items:center;gap:5px}
.sla-box{text-align:center;padding:13px;border-radius:10px;border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.06)}
.sla-big{font-size:24px;font-weight:800;color:var(--d);font-variant-numeric:tabular-nums}
.sla-lbl-sm{font-size:11px;color:var(--t2);margin-top:3px}
.act-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.act-btn{padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;width:100%}
/* ALERTS FEED */
.alert-feed{display:flex;flex-direction:column}
.af-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.af-item:last-child{border-bottom:none}
.af-item.new-item{animation:slideLeft .4s ease}
.af-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.af-body{flex:1}
.af-title{font-size:13px;font-weight:500;color:var(--t)}
.af-desc{font-size:11.5px;color:var(--t2);margin-top:2px}
.af-time{font-size:11px;color:var(--t2);white-space:nowrap;margin-top:2px}
/* AUTOMATION */
.wf-card{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:12px}
.wf-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.wf-meta{flex:1;min-width:0}.wf-title{font-size:14px;font-weight:700}

.wf-desc{font-size:12px;color:var(--t2);margin-top:3px}
.wf-flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.fn{display:flex;align-items:center;gap:6px;border:1px solid var(--bo);border-radius:var(--r2);padding:7px 11px;font-size:12.5px;font-weight:500}
.fn-t{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.07);color:var(--p)}
.fn-c{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.07);color:var(--w)}
.fn-a{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.07);color:var(--s)}
.farrow{color:var(--t2);font-size:13px}
.tog-wrap{position:relative;width:38px;height:21px;flex-shrink:0}
.tog-wrap input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--bo);border-radius:21px;cursor:pointer;transition:.3s}
.tog-sl:before{content:'';position:absolute;height:15px;width:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.tog-sl{background:var(--p)}
input:checked+.tog-sl:before{transform:translateX(17px)}
.wf-stats{display:flex;gap:18px;padding-top:12px;border-top:1px solid var(--bo)}
.wf-stat{font-size:12px;color:var(--t2)}
.wf-stat span{color:var(--t);font-weight:600}
/* KNOWLEDGE BASE */
.kb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kb-card{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);padding:20px;transition:all .2s;cursor:pointer}
.kb-card:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.3);box-shadow:0 8px 24px rgba(0,0,0,.28)}
.kb-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--p);margin-bottom:7px}
.kb-title{font-size:13.5px;font-weight:700;color:var(--t);margin-bottom:6px;line-height:1.4}
.kb-exc{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:13px}
.kb-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t2)}
.kb-send{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--p);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s}
.kb-send:hover{background:var(--p);color:#fff}
/* AI INSIGHTS */
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.ins-card{background:var(--c);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.ins-ttl{font-size:13.5px;font-weight:700;color:var(--t);margin-bottom:5px}
.ins-sub{font-size:12.5px;color:var(--t2);margin-bottom:13px;line-height:1.5}
.ai-rec-box{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.22);border-radius:10px;padding:13px;margin-bottom:10px}
.ai-rec-hdr{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}

function buildNav(){
  const nav=document.getElementById('sb-nav');
  nav.innerHTML=navItems.map(item=>`
    <div class="nav-item ${currentPage===item.key?'active':''}" onclick="navigateTo('${item.key}')" id="nav-${item.key}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${item.icon}</svg>
      <span class="nav-label">${t(item.key==='ai-insights'?'aiInsights':item.key==='knowledge'?'knowledge':item.key==='command'?'command':item.key)}</span>
      ${item.badge?`<span class="nav-badge">${item.badge}</span>`:''}
    </div>`).join('');
}

function navigateTo(page){
  if(currentPage===page) return;
  currentPage=page;
  buildNav();
  document.querySelectorAll('.page,.inbox-page,.cmd-page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('page-'+page);
  if(el) el.classList.add('active');
  renderPage(page);
}

function renderPage(page){
  const map={
    dashboard:renderDashboard,inbox:renderInbox,cases:renderCases,
    customers:renderCustomers,shipments:renderShipments,automation:renderAutomation,
    analytics:renderAnalytics,'ai-insights':renderAiInsights,knowledge:renderKnowledge,
    command:renderCommand,settings:renderSettings
  };
  if(map[page]) map[page]();
}

function setupReveal(){
  const revEls=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');}});
  },{threshold:0.1});
  revEls.forEach(el=>obs.observe(el));
}

function prioEmoji(p){return p==='critical'?'':p==='high'?'':'';}
function statusBadge(s){const m={'In Transit':'b-p','Delivered':'b-s','Delayed':'b-d','Out for Delivery':'b-w','Processing':'b-n','Open':'b-p','In Progress':'b-w','Resolved':'b-s','Escalated':'b-d','Critical':'b-d'};return`<span class="badge ${m[s]||'b-n'}">${s}</span>`}
function priorityBadge(p){const m={critical:'b-d',high:'b-w',medium:'b-a',low:'b-s'};return`<span class="badge ${m[p]||'b-n'}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`}
function channelIcon(ch){const m={email:'',whatsapp:'',chat:'',voice:''};return m[ch]||'';}
function fmtSla(due){const diff=due-Date.now();if(diff<=0)return'<span style="color:var(--d)">Breached</span>';const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);return`${h}h ${m}m`;}
function colorForIdx(i){return['#3B82F6','#8B5CF6','#22C55E','#F59E0B','#EF4444','#06B6D4','#F97316','#EC4899','#10B981','#818CF8'][i%10];}

function findShipmentForConv(conv){
  const linkedCase=cases.find(c=>c.id===conv.caseId);
  if(linkedCase) return shipments.find(s=>s.id===linkedCase.trackingId);
  return null;
}

function generateAiSuggestion(conv,ship){
  const msgs = conv.messages || [];
  const lastCustMsg = [...msgs].reverse().find(m=>m.role==='customer')?.text.toLowerCase() || '';
  const issue = conv.issue?.toLowerCase() || '';
  const name = conv.customer.split(' ')[0];
  const s = ship;

  // Damage analysis
  if(lastCustMsg.includes('damage') || lastCustMsg.includes('broken') || lastCustMsg.includes('crush') || issue.includes('damage') || issue.includes('cracked')) {
    return `Dear ${name}, I am extremely sorry to hear about the damage to your shipment. Could you please share a few photos of the package and the item? I will immediately initiate the damage claim process and send a replacement request to our warehouse.`;
  }

  // Address correction
  if(lastCustMsg.includes('address') || issue.includes('address')) {
    return `Hi ${name}, I understand you need to update the delivery address. Since the shipment ${s?s.id:''} is currently ${s?s.status.toLowerCase():'in transit'}, I have flagged this to our dispatch team at ${s?s.location:'the current hub'} to modify the label before out-for-delivery. Please provide the complete new address.`;
  }

  // Missing item
  if(lastCustMsg.includes('missing') || issue.includes('missing')) {
    return `Dear ${name}, I apologize for the missing item in your order. I have raised an urgent ticket with the fulfillment center to check the packing footage. Can you please confirm the exact item that was missing from the invoice?`;
  }

  // Delay / Stuck
  if(lastCustMsg.includes('delay') || lastCustMsg.includes('stuck') || lastCustMsg.includes('arrive') || issue.includes('delay') || (s && s.status==='Delayed')) {
    const loc = s ? s.location : 'a transit hub';
    const route = s ? s.route : 'its route';
    const eta = s ? s.eta : 'shortly';
    const id = s ? s.id : '';
    return `Hi ${name}, I sincerely apologize for the delay. Your shipment ${id} is currently halted at ${loc} along ${route} due to unexpected operational bottlenecks. Rest assured, we have expedited the clearance and it is now expected to be delivered by ${eta}.`;
  }

  // General fallback using shipment status
  if(s && s.status==='In Transit') return `Hi ${name}, your shipment ${s.id} is on the way! It is currently at ${s.location} via the ${s.route} route with an expected delivery of ${s.eta}. Thank you for your patience.`;
  if(s && s.status==='Delivered') return `Dear ${name}, our records show shipment ${s.id} was delivered on ${s.eta}. If you haven't received it, please let us know so we can investigate with the delivery executive immediately.`;

  return `Dear ${name}, thank you for contacting ResolveFlow. Our team is reviewing the details of your request and will provide a comprehensive update shortly.`;
}

function useAiSuggestion(){
  const conv=conversations.find(c=>c.id===activeConvId);
  const linkedShip=findShipmentForConv(conv);
  const txt=generateAiSuggestion(conv,linkedShip);
  const inp=document.getElementById('chat-inp');
  if(inp) inp.value=txt;
}

function selectConv(id){activeConvId=id;const conv=conversations.find(c=>c.id===id);if(conv)conv.unread=0;renderInbox();}

function sendChatReply(){
  const inp=document.getElementById('chat-inp');
  if(!inp||!inp.value.trim()) return;
  const conv=conversations.find(c=>c.id===activeConvId);
  conv.messages.push({role:'agent',text:inp.value.trim(),time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});
  conv.lastMsg=inp.value.trim().substring(0,40);
  inp.value='';
  renderInbox();
}

function startSlaTimer(linkedCase){
  if(slaTimers.inbox) clearInterval(slaTimers.inbox);
  if(!linkedCase) return;
  function updateTimer(){
    const el=document.getElementById('sla-countdown');
    if(!el){clearInterval(slaTimers.inbox);return;}
    const diff=linkedCase.slaDue-Date.now();
    if(diff<=0){el.textContent='BREACHED';el.style.color='var(--d)';return;}
    const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);
    el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.style.color=diff<1800000?'var(--d)':diff<3600000?'var(--w)':'var(--s)';
  }
  updateTimer();
  slaTimers.inbox=setInterval(updateTimer,1000);
}

    <td style="font-size:12.5px;color:var(--t2)">${s.route}</td>
    <td><span class="badge b-n">${s.type}</span></td>
    <td style="font-size:13px">${s.weight} kg</td>
    <td style="font-size:13px;font-weight:500">${s.eta}</td>

  <tr id="ship-detail-${s.id}" style="display:none"><td colspan="9" style="padding:0">
    <div style="background:rgba(59,130,246,.04);border-left:2px solid var(--p);padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;position:relative;margin-bottom:24px;max-width:550px">

        ${['Processing','In Transit','Out for Delivery','Delivered'].map((step,idx)=>{
           const steps=['Processing','In Transit','Out for Delivery','Delivered'];
           const currIdx=steps.indexOf(s.status==='Delayed'?'In Transit':s.status);
           const active=idx<=(currIdx===-1?0:currIdx);
           return `<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px">
             <div style="width:26px;height:26px;border-radius:50%;background:${active?'var(--p)':'var(--bg)'};border:2px solid ${active?'var(--p)':'var(--bo)'};display:flex;align-items:center;justify-content:center;color:${active?'#fff':'var(--t2)'};font-size:12px;font-weight:700">${active?'✓':idx+1}</div>
             <div style="font-size:11.5px;font-weight:600;color:${active?'var(--t)':'var(--t2)'}">${step}</div>
               </div>
  </div>
  `;
        }).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;background:var(--bg);padding:12px;border-radius:8px">
        <div><div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:4px">TYPE</div><div style="font-size:13px">${s.type}</div></div>
        <div><div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:4px">WEIGHT</div><div style="font-size:13px">${s.weight} kg</div></div>
        <div><div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:4px">ROUTE</div><div style="font-size:13px">${s.route}</div></div>
        <div><div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:4px">CURRENT</div><div style="font-size:13px">${s.location}</div></div>
        <div><div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:4px">ETA</div><div style="font-size:13px;font-weight:700;color:var(--p)">${s.eta}</div></div>
      </div>
    </div>
  </td></tr>`).join('');
}

function toggleShipDetail(id){const r=document.getElementById(`ship-detail-${id}`);if(r)r.style.display=r.style.display==='none'?'table-row':'none';}
function filterShipments(q,status=''){const tbody=document.getElementById('ship-tbody');if(!tbody)return;const f=shipments.filter(s=>(!q||(s.id+s.customer+s.location+s.route).toLowerCase().includes(q.toLowerCase()))&&(!status||s.status===status));tbody.innerHTML=renderShipRows(f);}

function handleSearch(q){
  const drop=document.getElementById('search-results');
  if(!q.trim()){
    drop.classList.remove('open');
    return;
  }
  const qLow=q.toLowerCase();
  const cRes=cases.filter(c=>(c.id+c.customer+c.trackingId+c.issue).toLowerCase().includes(qLow)).map(c=>`<div class="sr-item" onclick="navFromSearch('cases','${c.id}')"><div class="sr-title" style="color:var(--p)">${c.id} · ${c.customer}</div><div class="sr-desc">${c.issue}</div></div>`);
  const sRes=shipments.filter(s=>(s.id+s.customer+s.location).toLowerCase().includes(qLow)).map(s=>`<div class="sr-item" onclick="navFromSearch('shipments','${s.id}')"><div class="sr-title" style="color:var(--s)">${s.id} · ${s.customer}</div><div class="sr-desc">${s.status} at ${s.location}</div></div>`);
  const allRes=[...cRes,...sRes];
  if(allRes.length===0){
    drop.innerHTML=`<div class="sr-item" style="cursor:default;color:var(--t2);text-align:center">No results found for "${q}"    </div>
  </div>
  `;
  }else{
    drop.innerHTML=allRes.join('');
  }
  drop.classList.add('open');
}

function navFromSearch(page,id){
  navigateTo(page);
  document.getElementById('globalSearch').value='';
  document.getElementById('search-results').classList.remove('open');
  if(page==='cases'){
    setTimeout(()=>openCaseDetail(id), 100);
  } else if (page==='shipments') {
    // Optionally focus or filter the shipment row
  }
}

// ==================== REAL-TIME SIMULATION ====================
const newComplaints=[
  {customer:'Aditya Nair',company:'SpeedLink Cargo',issue:'Package missing from delivery',channel:'whatsapp',sla:'urgent',color:'#F97316',initials:'AN'},
  {customer:'Rekha Srinivas',company:'Coastal Freight',issue:'Shipment shows wrong location',channel:'email',sla:'medium',color:'#8B5CF6',initials:'RS'},
  {customer:'Manoj Kumar',company:'Apex Logistics',issue:'Damaged fragile item',channel:'chat',sla:'urgent',color:'#EF4444',initials:'MK'}
];
let newComplaintIdx=0;

function startRealtime(){
  // Push new complaint every 35 seconds
  setInterval(()=>{
    const nc=newComplaints[newComplaintIdx%newComplaints.length];
    newComplaintIdx++;
    const newCase={id:`CS-${1057+newComplaintIdx}`,customer:nc.customer,company:nc.company,issue:nc.issue,channel:nc.channel,priority:'high',status:'Open',agent:'Priya Sharma',trackingId:`RF-${4600+newComplaintIdx}`,sla:'2h',created:'Just now',slaDue:Date.now()+7200000};
    cases.unshift(newCase);
    const newConv={id:100+newComplaintIdx,caseId:newCase.id,customer:nc.customer,initials:nc.initials,channel:nc.channel,lastMsg:nc.issue,time:'Just now',unread:1,sla:nc.sla,color:nc.color,messages:[{role:'customer',text:nc.issue,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]};
    conversations.unshift(newConv);
    const alertEntry={type:'primary',title:'New Complaint Received',desc:`${newCase.id} — ${nc.customer}, ${nc.issue}`,time:'Just now'};
    liveAlerts.unshift(alertEntry);
    if(liveAlerts.length>12) liveAlerts.pop();
    // Update live alerts feed if on dashboard
    if(currentPage==='dashboard') renderAlertFeed();
    if(currentPage==='inbox') renderInbox();
    if(currentPage==='command') renderCommand();
    // Update notification badge
    const badge=document.querySelector('.nb-badge');
    if(badge){
      badge.textContent=liveAlerts.length;
      badge.classList.add('has-notifs');
      badge.style.animation='none';
      setTimeout(()=>badge.style.animation='pulseGlow 0.5s ease',10);
    }
    buildNav(); // refresh inbox sidebar badge
  },35000);
  // Update shipment statuses every 60s
  setInterval(()=>{
    const s=shipments[Math.floor(Math.random()*shipments.length)];
    if(s.status==='Processing') s.status='In Transit';
    else if(s.status==='In Transit'&&Math.random()>0.7) s.status='Out for Delivery';
    if(currentPage==='shipments') renderShipments();
  },60000);
}

function initChatbot(){

function appendBotMsg(text){

  d.textContent=text;

}

function showTyping(){
  const c=document.getElementById('cb-msgs');
  if(!c) return;

function hideTyping(){

}

function getBotResponse(msg){
  const q=msg.toLowerCase();
  // Shipment query
  const rfMatch=msg.match(/RF-?\d+/i);
  if(rfMatch){
    const id=rfMatch[0].toUpperCase().replace('RF','RF-').replace('RF--','RF-');
    const ship=shipments.find(s=>s.id.toLowerCase()===id.toLowerCase()||s.id.replace('-','').toLowerCase()===id.replace('-','').toLowerCase());
    if(ship) return `Shipment ${ship.id} is currently ${ship.status} at ${ship.location}. Route: ${ship.route}. Estimated delivery: ${ship.eta}. Weight: ${ship.weight}kg.`;
  }
  // Case query
  const csMatch=msg.match(/CS-?\d+/i);
  if(csMatch){
    const id=csMatch[0].toUpperCase().replace('CS','CS-').replace('CS--','CS-');
    const c=cases.find(cs=>cs.id.toLowerCase()===id.toLowerCase());
    if(c) return `Case ${c.id} is currently ${c.status}. Assigned to ${c.agent}. Issue: ${c.issue}. Priority: ${c.priority}. SLA: ${fmtSla(c.slaDue)} remaining.`;
  }
  // Create case
  if(q.includes('create case')||q.includes('new case')||q.includes('file complaint')||q.includes('create complaint')){
    const newId=`CS-${1060+Math.floor(Math.random()*100)}`;
    cases.unshift({id:newId,customer:'Chatbot User',company:'Retail',issue:'Damage claim via Chatbot',channel:'chat',priority:'high',status:'Open',agent:'Unassigned',trackingId:'—',sla:'2h',created:'Just now',slaDue:Date.now()+7200000});
    if(currentPage==='cases') renderCases();
    return `I have created a new case for you. Case ID: ${newId}. Our support team will review the claim shortly.`;
  }
  // Delay reasons
  if(q.includes('delay')||q.includes('late')||q.includes('delayed'))
    return 'Common causes of delays include highway checkpoints on NH-44 and NH-48, monsoon disruptions, vehicle breakdowns at redistribution hubs, and customs holds. Currently, the Chennai \u2192 Bangalore route has the highest delay rate at 34%.';
  // Damage claims
  if(q.includes('damage')||q.includes('broken')||q.includes('claim'))
    return 'To file a damage claim: 1) Document the damage with photos 2) Note the tracking ID and case ID 3) Submit via the Cases page with type: Damage. Compensation is typically processed within 5-7 business days for verified claims.';
  // Agent suggestion
  if(q.includes('reply')||q.includes('response')||q.includes('suggest'))
    return 'Go to the Inbox page and open the relevant conversation. The right panel shows an AI-generated suggested reply based on the shipment context. Click "Use This Reply" to populate the message box.';
  // Stats
  if(q.includes('stat')||q.includes('metric')||q.includes('how many'))
    return `Current stats: ${cases.filter(c=>c.status!=='Resolved').length} open cases, ${shipments.filter(s=>s.status==='In Transit').length} shipments in transit, ${shipments.filter(s=>s.status==='Delayed').length} delayed shipments, CSAT: 4.3 stars.`;
  // Greeting
  if(q.includes('hi')||q.includes('hello')||q.includes('hey'))
    return 'Hello! I can help you with shipment tracking (try "RF-2847"), case lookup (try "CS-1042"), or answer logistics questions. What do you need?';
  return 'I can help with: shipment status (type a tracking ID like RF-2847), case details (type CS-1042), creating cases, delay reasons, damage claims, or suggest agent replies. What would you like?';
}

function sendChatMsg(){
  const inp=document.getElementById('cb-inp');
  if(!inp||!inp.value.trim()) return;
  const msg=inp.value.trim();
  inp.value='';
  appendUserMsg(msg);
  showTyping();
  const delay=800+Math.random()*700;
  setTimeout(()=>{
    hideTyping();
    appendBotMsg(getBotResponse(msg));
  },delay);
}

function submitNewCase(){
  const cust=document.getElementById('nc-cust').value.trim()||'Unknown Customer';
  const ship=document.getElementById('nc-ship').value.trim()||'—';
  const type=document.getElementById('nc-type').value;
  let issue=document.getElementById('nc-issue').value.trim()||'No details provided';

  const prio=document.getElementById('nc-prio').value;
